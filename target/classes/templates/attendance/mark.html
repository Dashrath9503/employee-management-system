<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"><title>Mark Attendance — EMS</title></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='attendance'"></div>
<div class="main-content">
  <div class="topbar">
    <span class="topbar-title"><i class="fas fa-edit topbar-icon me-2"></i>Mark Attendance</span>
    <a href="/attendance" class="btn btn-sm btn-outline-secondary px-3"><i class="fas fa-arrow-left me-1"></i>Back</a>
  </div>
  <div class="page-body">
    <div class="card-pro card-pro-body mb-3" style="padding:14px 20px;">
      <form method="get" class="d-flex align-items-center gap-3">
        <label class="form-label mb-0" style="font-weight:500;white-space:nowrap;">Date:</label>
        <input type="date" name="date" class="form-control" style="width:180px;"
               th:value="${#temporals.format(date,'yyyy-MM-dd')}"/>
        <button type="submit" class="btn btn-primary btn-sm px-3"><i class="fas fa-sync me-1"></i>Load</button>
      </form>
    </div>

    <div class="card-pro card-pro-body">
      <form th:action="@{/attendance/save}" method="post">
        <input type="hidden" name="date" th:value="${#temporals.format(date,'yyyy-MM-dd')}"/>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span style="font-weight:600;font-size:.95rem;color:#1e293b;">
            Attendance for: <strong th:text="${#temporals.format(date,'dd MMM yyyy')}">Today</strong>
          </span>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm btn-outline-success" onclick="markAll('PRESENT')">
              <i class="fas fa-check me-1"></i>All Present
            </button>
            <button type="submit" class="btn btn-sm btn-primary px-3">
              <i class="fas fa-save me-1"></i>Save Attendance
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-pro mb-0">
            <thead>
              <tr><th>Employee</th><th>Department</th><th>Status</th><th>Check In</th><th>Remarks</th></tr>
            </thead>
            <tbody>
              <tr th:each="a : ${attendances}">
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="emp-avatar"
                         th:style="'background:hsl('+${#strings.length(a.employee.firstName)*47}+',55%,52%)'">
                      <span th:text="${#strings.substring(a.employee.firstName,0,1)+#strings.substring(a.employee.lastName,0,1)}">AB</span>
                    </div>
                    <div>
                      <div style="font-weight:600;font-size:.87rem;" th:text="${a.employee.fullName}">Name</div>
                      <div style="font-size:.74rem;color:#94a3b8;" th:text="${a.employee.jobTitle ?: ''}">-</div>
                    </div>
                  </div>
                </td>
                <td th:text="${a.employee.department != null ? a.employee.department.name : '-'}">-</td>
                <td>
                  <select th:name="'status_' + ${a.employee.id}" class="form-select status-select" style="width:130px;">
                    <option value="PRESENT"  th:selected="${a.status.name()=='PRESENT'}">Present</option>
                    <option value="ABSENT"   th:selected="${a.status.name()=='ABSENT'}">Absent</option>
                    <option value="HALF_DAY" th:selected="${a.status.name()=='HALF_DAY'}">Half Day</option>
                    <option value="LATE"     th:selected="${a.status.name()=='LATE'}">Late</option>
                    <option value="ON_LEAVE" th:selected="${a.status.name()=='ON_LEAVE'}">On Leave</option>
                  </select>
                </td>
                <td>
                  <input type="time" th:name="'checkIn_' + ${a.employee.id}" class="form-control"
                         style="width:120px;" th:value="${a.checkIn}"/>
                </td>
                <td>
                  <input type="text" th:name="'remarks_' + ${a.employee.id}" class="form-control"
                         style="width:160px;" placeholder="Optional" th:value="${a.remarks}"/>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(attendances)}">
                <td colspan="5" class="text-center text-muted py-4">No employees found</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="mt-3 d-flex justify-content-end">
          <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-save me-2"></i>Save Attendance
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
function markAll(status) {
  document.querySelectorAll('.status-select').forEach(s => s.value = status);
}
</script>
</body>
</html>
