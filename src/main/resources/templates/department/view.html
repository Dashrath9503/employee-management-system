<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}"><title>Department View — EMS</title></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='departments'"></div>
<div class="main-content">
  <div class="topbar">
    <span class="topbar-title"><i class="fas fa-building topbar-icon me-2"></i>Department Details</span>
    <div class="d-flex gap-2">
      <a th:href="@{/departments/edit/{id}(id=${department.id})}" class="btn btn-sm btn-primary px-3"
         sec:authorize="hasAnyRole('ADMIN','HR')">
        <i class="fas fa-edit me-1"></i>Edit
      </a>
      <a href="/departments" class="btn btn-sm btn-outline-secondary px-3">
        <i class="fas fa-arrow-left me-1"></i>Back
      </a>
    </div>
  </div>
  <div class="page-body">
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card-pro card-pro-body text-center">
          <div class="stat-icon mx-auto mb-3" style="background:#ede9fe;width:60px;height:60px;border-radius:16px;">
            <i class="fas fa-building fa-xl" style="color:#4f46e5;"></i>
          </div>
          <h5 style="font-weight:700;color:#1e293b;" th:text="${department.name}">Dept Name</h5>
          <p style="color:#64748b;font-size:.87rem;" th:text="${department.description}">-</p>
          <span style="background:#ede9fe;color:#4338ca;padding:5px 14px;border-radius:20px;font-size:.82rem;font-weight:600;"
                th:text="${department.employeeCount} + ' Employees'">0</span>
          <hr style="margin:16px 0;border-color:#f1f5f9;"/>
          <div class="text-start">
            <div style="font-size:.72rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">Manager</div>
            <div style="font-size:.9rem;font-weight:500;color:#1e293b;margin-top:3px;"
                 th:text="${department.managerName ?: 'N/A'}">-</div>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card-pro card-pro-body">
          <div class="section-hdr"><i class="fas fa-users me-2" style="color:#4f46e5;"></i>Employees in this Department</div>
          <div class="table-responsive">
            <table class="table table-pro mb-0">
              <thead>
                <tr><th>Employee</th><th>Job Title</th><th>Status</th><th>Action</th></tr>
              </thead>
              <tbody>
                <tr th:each="emp : ${department.employees}">
                  <td>
                    <div class="d-flex align-items-center gap-2">
                      <div class="emp-avatar"
                           th:style="'background:hsl('+${#strings.length(emp.firstName)*47}+',55%,52%)'">
                        <span th:text="${#strings.substring(emp.firstName,0,1)+#strings.substring(emp.lastName,0,1)}">AB</span>
                      </div>
                      <div>
                        <div style="font-weight:600;font-size:.87rem;" th:text="${emp.fullName}">Name</div>
                        <div style="font-size:.74rem;color:#94a3b8;" th:text="${emp.email}">email</div>
                      </div>
                    </div>
                  </td>
                  <td th:text="${emp.jobTitle ?: '-'}">-</td>
                  <td>
                    <span th:class="${emp.status.name()=='ACTIVE'?'badge-active':emp.status.name()=='ON_LEAVE'?'badge-leave':'badge-inactive'}"
                          th:text="${emp.status}">-</span>
                  </td>
                  <td>
                    <a th:href="@{/employees/view/{id}(id=${emp.id})}" class="btn btn-sm btn-outline-primary">
                      <i class="fas fa-eye"></i>
                    </a>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(department.employees)}">
                  <td colspan="4" class="text-center text-muted py-4">No employees in this department</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
