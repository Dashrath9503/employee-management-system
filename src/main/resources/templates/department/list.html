<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}"><title>Departments — EMS</title></head>
<body>
<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='departments'"></div>
<div class="main-content">
  <div class="topbar">
    <span class="topbar-title"><i class="fas fa-building topbar-icon me-2"></i>Departments</span>
    <a href="/departments/add" class="btn btn-sm btn-primary px-3" sec:authorize="hasAnyRole('ADMIN','HR')">
      <i class="fas fa-plus me-1"></i>Add Department
    </a>
  </div>
  <div class="page-body">
    <div th:if="${successMessage}" class="alert-pro alert-success-pro mb-3">
      <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-pro alert-danger-pro mb-3">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <div class="row g-3">
      <div class="col-md-4" th:each="dept : ${departments}">
        <div class="card-pro card-pro-body" style="border-left:4px solid #4f46e5;">
          <div class="d-flex align-items-start gap-3 mb-3">
            <div class="stat-icon" style="background:#ede9fe;flex-shrink:0;">
              <i class="fas fa-building" style="color:#4f46e5;"></i>
            </div>
            <div class="flex-grow-1">
              <h6 style="font-weight:700;margin:0;color:#1e293b;" th:text="${dept.name}">Dept</h6>
              <p style="font-size:.8rem;color:#64748b;margin:3px 0 0;" th:text="${dept.description}">-</p>
            </div>
          </div>
          <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
              <span style="font-size:.76rem;color:#94a3b8;">Manager: </span>
              <span style="font-size:.82rem;font-weight:500;color:#374151;"
                    th:text="${dept.managerName ?: 'N/A'}">-</span>
            </div>
            <span style="background:#ede9fe;color:#4338ca;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;"
                  th:text="${dept.employeeCount} + ' Employees'">0</span>
          </div>
          <div class="d-flex gap-2">
            <a th:href="@{/departments/view/{id}(id=${dept.id})}" class="btn btn-sm btn-outline-primary flex-grow-1">
              <i class="fas fa-eye me-1"></i>View
            </a>
            <a th:href="@{/departments/edit/{id}(id=${dept.id})}" class="btn btn-sm btn-outline-warning"
               sec:authorize="hasAnyRole('ADMIN','HR')">
              <i class="fas fa-edit"></i>
            </a>
            <a th:href="@{/departments/delete/{id}(id=${dept.id})}" class="btn btn-sm btn-outline-danger"
               sec:authorize="hasRole('ADMIN')"
               onclick="return confirm('Delete this department?')">
              <i class="fas fa-trash"></i>
            </a>
          </div>
        </div>
      </div>

      <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(departments)}">
        <i class="fas fa-building fa-3x mb-3" style="color:#cbd5e1;"></i>
        <p class="text-muted">No departments. <a href="/departments/add">Add one now</a></p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
