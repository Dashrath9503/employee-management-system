<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}">
  <title>Dashboard — EMS</title>
</head>
<body>
<div th:replace="~{fragments/layout :: sidebar}" th:with="activePage='dashboard'"></div>

<div class="main-content">
  <div class="topbar">
    <span class="topbar-title">
      <i class="fas fa-chart-pie topbar-icon me-2"></i>Dashboard
    </span>
    <span style="font-size:.82rem;color:#94a3b8;">
      <i class="fas fa-calendar me-1"></i>
      <span th:text="${#temporals.format(#temporals.createNow(),'dd MMM yyyy')}">Today</span>
    </span>
  </div>

  <div class="page-body">

    <!-- Stat Cards Row -->
    <div class="row g-3 mb-4">
      <div class="col-xl col-md-4 col-6">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#ede9fe;"><i class="fas fa-users" style="color:#4f46e5;"></i></div>
            <div>
              <div class="stat-val" th:text="${totalEmployees}">0</div>
              <div class="stat-label">Total Employees</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl col-md-4 col-6">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#dcfce7;"><i class="fas fa-user-check" style="color:#16a34a;"></i></div>
            <div>
              <div class="stat-val" th:text="${activeEmployees}">0</div>
              <div class="stat-label">Active</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl col-md-4 col-6">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fef9c3;"><i class="fas fa-user-clock" style="color:#ca8a04;"></i></div>
            <div>
              <div class="stat-val" th:text="${onLeaveEmployees}">0</div>
              <div class="stat-label">On Leave</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl col-md-4 col-6">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fee2e2;"><i class="fas fa-user-times" style="color:#dc2626;"></i></div>
            <div>
              <div class="stat-val" th:text="${inactiveEmployees}">0</div>
              <div class="stat-label">Inactive</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl col-md-4 col-6">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#e0f2fe;"><i class="fas fa-building" style="color:#0284c7;"></i></div>
            <div>
              <div class="stat-val" th:text="${totalDepartments}">0</div>
              <div class="stat-label">Departments</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl col-md-4 col-6">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fce7f3;"><i class="fas fa-calendar-times" style="color:#db2777;"></i></div>
            <div>
              <div class="stat-val" th:text="${pendingLeaves}">0</div>
              <div class="stat-label">Pending Leaves</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-3 mb-4">
      <div class="col-lg-8">
        <div class="card-pro card-pro-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span style="font-weight:600;font-size:.95rem;color:#1e293b;">
              <i class="fas fa-building me-2" style="color:#4f46e5;"></i>Employees by Department
            </span>
          </div>
          <canvas id="deptChart" height="100"></canvas>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card-pro card-pro-body">
          <div class="mb-3">
            <span style="font-weight:600;font-size:.95rem;color:#1e293b;">
              <i class="fas fa-chart-pie me-2" style="color:#4f46e5;"></i>Status Overview
            </span>
          </div>
          <canvas id="statusChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Recent Employees -->
    <div class="card-pro card-pro-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span style="font-weight:600;font-size:.95rem;color:#1e293b;">
          <i class="fas fa-clock me-2" style="color:#4f46e5;"></i>Recent Employees
        </span>
        <a href="/employees" class="btn btn-sm btn-outline-primary px-3">
          View All <i class="fas fa-arrow-right ms-1"></i>
        </a>
      </div>
      <div class="table-responsive">
        <table class="table table-pro mb-0">
          <thead>
            <tr>
              <th>Employee</th><th>Job Title</th><th>Department</th><th>Join Date</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="emp : ${recentEmployees}">
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="emp-avatar"
                       th:style="'background: hsl('+${#strings.length(emp.firstName)*47}+',55%,52%)'">
                    <span th:text="${#strings.substring(emp.firstName,0,1)+#strings.substring(emp.lastName,0,1)}">AB</span>
                  </div>
                  <div>
                    <div style="font-weight:600;font-size:.87rem;" th:text="${emp.fullName}">Name</div>
                    <div style="font-size:.74rem;color:#94a3b8;" th:text="${emp.email}">email</div>
                  </div>
                </div>
              </td>
              <td th:text="${emp.jobTitle ?: '-'}">-</td>
              <td th:text="${emp.department != null ? emp.department.name : '-'}">-</td>
              <td th:text="${emp.joinDate != null ? #temporals.format(emp.joinDate,'dd MMM yyyy') : '-'}">-</td>
              <td>
                <span th:class="${emp.status.name()=='ACTIVE'?'badge-active':emp.status.name()=='ON_LEAVE'?'badge-leave':'badge-inactive'}"
                      th:text="${emp.status}">ACTIVE</span>
              </td>
              <td>
                <a th:href="@{/employees/view/{id}(id=${emp.id})}" class="btn btn-sm btn-outline-primary">
                  <i class="fas fa-eye"></i>
                </a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(recentEmployees)}">
              <td colspan="6" class="text-center text-muted py-4">No employees found</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script th:inline="javascript">
  const deptNames  = /*[[${deptNames}]]*/ [];
  const deptCounts = /*[[${deptCounts}]]*/ [];
  const statusLabels = /*[[${statusLabels}]]*/ [];
  const statusData   = /*[[${statusData}]]*/ [];

  new Chart(document.getElementById('deptChart'), {
    type: 'bar',
    data: {
      labels: deptNames,
      datasets: [{
        label: 'Employees',
        data: deptCounts,
        backgroundColor: ['#818cf8','#34d399','#fb923c','#f472b6','#60a5fa','#a78bfa'],
        borderRadius: 8, borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f1f5f9' } },
        x: { grid: { display: false } }
      }
    }
  });

  new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
      labels: statusLabels,
      datasets: [{
        data: statusData,
        backgroundColor: ['#4f46e5','#f59e0b','#ef4444','#94a3b8'],
        borderWidth: 0, hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      cutout: '70%',
      plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } } }
    }
  });
</script>
</body>
</html>
